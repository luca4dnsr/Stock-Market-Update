name: 📈 SPX Daily Update

on:
  schedule:
    # 미국 동부 시간 오후 4시 마감 기준
    # 여름(EDT): 20:00 UTC / 겨울(EST): 21:00 UTC
    # → 22:00 UTC (= 다음날 07:00 KST) 실행으로 DST 관계없이 안전
    - cron: '0 22 * * 1-5'   # 월~금 UTC 22:00 (KST 다음날 07:00)

  # 수동 트리거 (GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (데이터 수집만, 파일 출력 없음)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write   # output/ 및 docs/ 커밋·푸시를 위해 필요

jobs:
  generate:
    name: Generate SPX Daily Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 설정 ────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 캐시는 7일 유효한 구성종목 CSV를 다음 실행에 복원한다.
      # 매 실행마다 고유 키를 저장하고, 최신 캐시를 prefix로 복원한다.
      - name: Restore S&P 500 components cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: spx-components-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            spx-components-${{ runner.os }}-

      # ── 3. 의존성 설치 ────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. SPX 업데이트 실행 ─────────────────────────────
      - name: Run SPX update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run --verbose
          else
            python main.py --verbose
          fi

      # ── 5. GitHub Pages용 HTML 복사 ─────────────────────
      - name: Prepare GitHub Pages (docs/)
        if: github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p docs
          # 가장 최신 HTML을 index.html로 복사
          LATEST=$(ls -t output/SPX_daily_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/index.html
            echo "GitHub Pages: $LATEST → docs/index.html"
          fi

      # ── 6. 생성 파일을 Actions Artifact로 업로드 ─────────
      - name: Upload output as artifact
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spx-daily-${{ github.run_number }}
          path: output/
          retention-days: 30    # 30일 보관 후 자동 삭제

      # ── 7. output/ + docs/ 를 저장소에 커밋 ──────────────
      - name: Commit and push output
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # output/ 및 docs/는 로컬 산출물을 무시하도록 .gitignore에 있으므로
          # Actions가 생성한 검증 완료 산출물만 의도적으로 강제 스테이징한다.
          git add -f output/ docs/
          # 변경 사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            DATE=$(date -u +'%Y-%m-%d')
            git commit -m "📈 SPX Daily Update ${DATE} [auto]"
            git push
            echo "커밋 및 푸시 완료"
          fi

      # ── 8. 이메일 본문(HTML) 생성 ────────────────────────
      - name: Generate email body
        if: github.event.inputs.dry_run != 'true'
        run: |
          python3 - << 'PYEOF'
          import json, pathlib

          s = json.loads(pathlib.Path("output/summary.json").read_text())

          def row(r):
              color = "#cc0000" if r["return_1d"] > 0 else "#0055cc"
              sign  = f"+{r['return_1d']:.1f}" if r["return_1d"] > 0 else f"{r['return_1d']:.1f}"
              return (
                  f"<tr>"
                  f"<td style='padding:8px 12px;font-weight:700'>{r['ticker']}</td>"
                  f"<td style='padding:8px 12px;color:#555'>{r['name'][:32]}</td>"
                  f"<td style='padding:8px 12px;text-align:right;font-weight:700;color:{color}'>{sign}%</td>"
                  f"</tr>"
              )

          top_rows = "".join(row(r) for r in s["top3"])
          bot_rows = "".join(row(r) for r in s["bot3"])
          adv_pct  = round(s["advances"] / max(s["advances"] + s["declines"], 1) * 100)

          html = f"""
          <!DOCTYPE html><html><body style="margin:0;padding:20px;background:#f0f4f8;font-family:'Helvetica Neue',Arial,sans-serif">
          <div style="max-width:580px;margin:0 auto">

            <!-- 헤더 -->
            <div style="background:linear-gradient(135deg,#111827,#1e3a5f);padding:28px 32px;border-radius:12px 12px 0 0">
              <h1 style="margin:0;color:white;font-size:22px;font-weight:800">📈 SPX Daily Monitor</h1>
              <p style="margin:6px 0 0;color:#94a3b8;font-size:13px">데이터 기준일: {s['data_date']}</p>
            </div>

            <!-- 시장 폭 -->
            <div style="background:white;padding:24px 32px">
              <table style="width:100%;border-collapse:separate;border-spacing:12px"><tr>
                <td style="background:#fff5f5;border:1.5px solid #fca5a5;border-radius:10px;padding:16px;text-align:center">
                  <div style="font-size:30px;font-weight:900;color:#cc0000">↑ {s['advances']}</div>
                  <div style="color:#888;font-size:12px;margin-top:4px">상승 종목</div>
                </td>
                <td style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:10px;padding:16px;text-align:center">
                  <div style="font-size:30px;font-weight:900;color:#0055cc">↓ {s['declines']}</div>
                  <div style="color:#888;font-size:12px;margin-top:4px">하락 종목</div>
                </td>
                <td style="background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center">
                  <div style="font-size:30px;font-weight:900;color:#374151">{adv_pct}%</div>
                  <div style="color:#888;font-size:12px;margin-top:4px">상승 비율</div>
                </td>
              </tr></table>
            </div>

            <!-- 상위 TOP 3 -->
            <div style="background:white;padding:0 32px 20px">
              <h2 style="font-size:15px;margin:0 0 10px;color:#111">🚀 상위 TOP 3</h2>
              <table style="width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
                <thead><tr style="background:#f9fafb">
                  <th style="padding:8px 12px;text-align:left;font-size:11px;color:#6b7280">티커</th>
                  <th style="padding:8px 12px;text-align:left;font-size:11px;color:#6b7280">종목명</th>
                  <th style="padding:8px 12px;text-align:right;font-size:11px;color:#6b7280">1일 수익률</th>
                </tr></thead>
                <tbody>{top_rows}</tbody>
              </table>
            </div>

            <!-- 하위 BOTTOM 3 -->
            <div style="background:white;padding:0 32px 24px">
              <h2 style="font-size:15px;margin:0 0 10px;color:#111">📉 하위 BOTTOM 3</h2>
              <table style="width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
                <thead><tr style="background:#f9fafb">
                  <th style="padding:8px 12px;text-align:left;font-size:11px;color:#6b7280">티커</th>
                  <th style="padding:8px 12px;text-align:left;font-size:11px;color:#6b7280">종목명</th>
                  <th style="padding:8px 12px;text-align:right;font-size:11px;color:#6b7280">1일 수익률</th>
                </tr></thead>
                <tbody>{bot_rows}</tbody>
              </table>
            </div>

            <!-- 푸터 -->
            <div style="background:#f9fafb;padding:16px 32px;border-radius:0 0 12px 12px;border-top:1px solid #e5e7eb">
              <p style="margin:0;font-size:12px;color:#9ca3af">
                📎 전체 데이터는 첨부된 <b>Excel 파일</b>을 확인하세요.<br>
                자동 생성: SPX Daily Monitor (GitHub Actions)
              </p>
            </div>

          </div></body></html>
          """

          pathlib.Path("output/email_body.html").write_text(html.strip(), encoding="utf-8")
          print("이메일 본문 생성 완료")
          PYEOF

      - name: Set report date for email
        if: github.event.inputs.dry_run != 'true'
        run: |
          REPORT_DATE=$(python3 -c "import json; print(json.load(open('output/summary.json'))['data_date'])")
          REPORT_EXCEL=$(python3 -c "import json; print(json.load(open('output/summary.json'))['excel_name'])")
          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_ENV"
          echo "REPORT_EXCEL=output/${REPORT_EXCEL}" >> "$GITHUB_ENV"

      # ── 9. 이메일 발송 ────────────────────────────────────
      # 사전 설정 필요: GitHub Secrets에 EMAIL_USERNAME, EMAIL_PASSWORD, EMAIL_TO 등록
      # 설정 안 되어 있으면 이 스텝은 조용히 건너뜀 (continue-on-error: true)
      - name: Send email report
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true   # 이메일 미설정 시에도 워크플로우 실패 X
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.naver.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📈 SPX Daily Update ${{ env.REPORT_DATE }}"
          html_body: file://output/email_body.html
          to: ${{ secrets.EMAIL_TO }}
          from: "SPX Daily Monitor <${{ secrets.EMAIL_USERNAME }}>"
          attachments: ${{ env.REPORT_EXCEL }}

      # ── 10. 실행 요약 ─────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### 📈 SPX Daily Automation Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 실행 시각 (UTC) | $(date -u +'%Y-%m-%d %H:%M') |" >> $GITHUB_STEP_SUMMARY
          echo "| 실행 번호 | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          if ls output/SPX_daily_*.xlsx 1>/dev/null 2>&1; then
            echo "| Excel 생성 | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| HTML 생성  | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi
